name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write  # needed to create releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Get version from package.json
        id: version
        shell: pwsh
        run: |
          $packageJson = Get-Content -Path "package.json" -Raw | ConvertFrom-Json
          $ver = $packageJson.version
          $tag = "v$ver"
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VER=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver"
          Write-Host "Tag: $tag"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build standalone executable
        shell: pwsh
        run: |
          npm run dist
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          SKIP_NOTARIZATION: true
          GH_TOKEN: ""

      - name: Find and prepare executable
        shell: pwsh
        run: |
          # Verify the built folder exists with all dependencies
          $portableFolder = "dist\win-unpacked"
          
          if (-not (Test-Path $portableFolder)) {
            Write-Error "Portable folder not found at $portableFolder"
            exit 1
          }
          
          # Check that key files exist
          $exePath = Join-Path $portableFolder "EasyDraft.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "EasyDraft.exe not found in portable folder"
            exit 1
          }
          
          Write-Host "✓ Found portable folder: $portableFolder"
          Write-Host "✓ EasyDraft.exe present"
          
          # Count files to verify dependencies are included
          $fileCount = (Get-ChildItem -Path $portableFolder -Recurse -File).Count
          Write-Host "✓ Total files in portable: $fileCount"
          
          # Get total size
          $size = (Get-ChildItem -Path $portableFolder -Recurse | Measure-Object -Property Length -Sum).Sum
          Write-Host "✓ Total size: $(($size / 1MB).ToString('F2')) MB"

      - name: Create portable zip
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VER }}"
          $zipPath = "EasyDraft-v$ver-portable.zip"
          
          # Create zip of the entire portable folder
          Compress-Archive -Path "dist\win-unpacked\*" -DestinationPath $zipPath -Force
          
          Write-Host "✓ Created: $zipPath"
          Write-Host "  Size: $(((Get-Item $zipPath).Length / 1MB).ToString('F2')) MB"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EasyDraft v${{ steps.version.outputs.VER }}"
          tag_name: ${{ steps.version.outputs.TAG }}
          body: |
            ## EasyDraft ${{ steps.version.outputs.TAG }}

            Draft Management System for OBS overlays with Electron

            **By [TerrierDarts](https://github.com/TerrierDarts)**

            ### Installation
            1. Download `EasyDraft-v${{ steps.version.outputs.VER }}-portable.zip`
            2. Extract anywhere
            3. Run `EasyDraft.exe` - no installation needed!
            4. Start managing your drafts with live OBS overlays

            > **Requires Windows 10/11 — fully portable, all dependencies included**

            ### Features
            - Live draft management with real-time overlays
            - Customizable overlay themes (fonts, sizes, colors)
            - OBS integration ready
            - Team management and player tracking
            - WebSocket-based overlay updates
          draft: false
          prerelease: ${{ contains(steps.version.outputs.TAG, '-') }}
          files: |
            EasyDraft-v${{ steps.version.outputs.VER }}-portable.zip

