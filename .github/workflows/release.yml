name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.0.0, v1.0.1

permissions:
  contents: write  # needed to create releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"           # e.g. v1.0.0
          $ver = $tag.TrimStart('v')                # e.g. 1.0.0
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VER=$ver" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build standalone executable
        shell: pwsh
        run: |
          npm run dist
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          SKIP_NOTARIZATION: true
          GH_TOKEN: ""

      - name: Find and prepare executable
        shell: pwsh
        run: |
          # Find the built executable in win-unpacked
          $exePath = Get-ChildItem -Path "dist\win-unpacked" -Filter "EasyDraft.exe" | Select-Object -First 1
          
          if (-not $exePath) {
            Write-Error "EasyDraft.exe not found in dist\win-unpacked"
            exit 1
          }
          
          Write-Host "Found executable: $($exePath.FullName)"
          Write-Host "Size: $(($exePath.Length / 1MB).ToString('F2')) MB"
          
          # Copy to root dist folder for easier access
          Copy-Item $exePath.FullName "dist\EasyDraft.exe"
          Write-Host "Copied to dist\EasyDraft.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EasyDraft v${{ steps.version.outputs.VER }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## EasyDraft ${{ steps.version.outputs.TAG }}

            Draft Management System for OBS overlays with Electron

            **By [TerrierDarts](https://github.com/TerrierDarts)**

            ### Installation
            1. Download `EasyDraft.exe`
            2. Run it - no installation needed!
            3. Start managing your drafts with live OBS overlays

            > **Requires Windows 10/11 — portable, no dependencies needed**

            ### Features
            - Live draft management with real-time overlays
            - Customizable overlay themes (fonts, sizes, colors)
            - OBS integration ready
            - Team management and player tracking
            - WebSocket-based overlay updates
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/EasyDraft.exe

