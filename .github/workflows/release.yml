name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Get version from tag
        id: version
        run: |
          $tag = "${{ github.ref }}".Replace("refs/tags/", "")
          $version = $tag.TrimStart("v")
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT
      
      - name: Update package.json version
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version
      
      - name: Build application
        run: npm run build
      
      - name: Build distributable
        continue-on-error: true
        run: npm run dist
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          SKIP_NOTARIZATION: true
          GH_TOKEN: ""
      
      - name: List build artifacts
        run: |
          Write-Host "Contents of dist directory:"
          if (Test-Path "dist") {
            Get-ChildItem -Path "dist" -Recurse | Format-Table FullName
          } else {
            Write-Host "dist directory does not exist"
          }
      
      - name: Find .exe file
        id: exe
        continue-on-error: true
        run: |
          $exeFile = Get-ChildItem -Path "dist" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exeFile) {
            $fullPath = $exeFile.FullName
            echo "path=$fullPath" >> $env:GITHUB_OUTPUT
            echo "name=$($exeFile.Name)" >> $env:GITHUB_OUTPUT
            Write-Host "✓ Found: $($exeFile.Name)"
            Write-Host "  Full path: $fullPath"
          } else {
            Write-Host "⚠ No .exe file found in dist directory"
            Write-Host "Listing dist contents:"
            if (Test-Path "dist") {
              Get-ChildItem -Path "dist" -Recurse
            } else {
              Write-Host "dist directory not found"
            }
            echo "path=" >> $env:GITHUB_OUTPUT
            echo "name=" >> $env:GITHUB_OUTPUT
          }
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: EasyDraft ${{ steps.version.outputs.version }}
          body: |
            ## EasyDraft ${{ steps.version.outputs.version }}
            
            Draft Management System for OBS overlays with Electron
            
            ### Features
            - Live draft management with real-time overlays
            - Customizable overlay themes (fonts, sizes, colors)
            - OBS integration ready
            - Team management and player tracking
            
            ### Build Status
            Build completed on: ${{ runner.os }} (${{ runner.arch }})
          files: ${{ steps.exe.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
